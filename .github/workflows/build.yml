name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build
        run: |
          # 1. Find and unzip the project
          ZIP_FILE=$(find . -name "*.zip" | head -n 1)
          unzip -o "$ZIP_FILE"
          
          # 2. Find the folder that contains 'gradlew'
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          
          # 3. Move to that folder and build
          cd "$PROJECT_ROOT"
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppSaver-APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
